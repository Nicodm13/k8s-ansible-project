name: Build Application Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "applications/TaxSystem/*.yaml"

permissions:
  contents: write
  packages: write

concurrency:
  group: application-images
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest

    outputs:
      client: ${{ steps.force.outputs.value || steps.filter.outputs.client }}
      citizen: ${{ steps.force.outputs.value || steps.filter.outputs.citizen }}
      company: ${{ steps.force.outputs.value || steps.filter.outputs.company }}
      bank: ${{ steps.force.outputs.value || steps.filter.outputs.bank }}
      statementgenerator: ${{ steps.force.outputs.value || steps.filter.outputs.statementgenerator }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            shared: &shared
              - "applications/TaxSystem/src/TaxSystem.Shared/**"
            client:
              - *shared
              - "applications/TaxSystem/src/TaxSystem.Client/**"
            citizen:
              - *shared
              - "applications/TaxSystem/src/TaxSystem.CitizenService/**"
            company:
              - *shared
              - "applications/TaxSystem/src/TaxSystem.CompanyService/**"
            bank:
              - *shared
              - "applications/TaxSystem/src/TaxSystem.BankService/**"
            statementgenerator:
              - *shared
              - "applications/TaxSystem/src/TaxSystem.StatementGeneratorService/**"

      - name: Force full build on manual dispatch
        id: force
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: echo "value=true" >> "$GITHUB_OUTPUT"

  build:
    name: Build and publish images
    needs: changes
    if: |
      needs.changes.outputs.client == 'true' ||
      needs.changes.outputs.citizen == 'true' ||
      needs.changes.outputs.company == 'true' ||
      needs.changes.outputs.bank == 'true' ||
      needs.changes.outputs.statementgenerator == 'true'
    runs-on: ubuntu-latest

    env:
      REGISTRY_PREFIX: ghcr.io/nicodm13/k8s-ansible-project
      TAXSYSTEM_SOLUTION_DIR: applications/TaxSystem/src
      SOURCE_SHA: ${{ github.sha }}
      BUILD_CLIENT: ${{ needs.changes.outputs.client }}
      BUILD_CITIZEN: ${{ needs.changes.outputs.citizen }}
      BUILD_COMPANY: ${{ needs.changes.outputs.company }}
      BUILD_BANK: ${{ needs.changes.outputs.bank }}
      BUILD_STATEMENTGENERATOR: ${{ needs.changes.outputs.statementgenerator }}

    steps:
      - name: Generate deployment app token
        id: deployment-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.deployment-app-token.outputs.token }}
          ref: ${{ github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish changed TaxSystem projects
        shell: bash
        run: |
          set -euo pipefail

          dotnet build "$TAXSYSTEM_SOLUTION_DIR/TaxSystem.sln" --configuration Release
          rm -rf "$TAXSYSTEM_SOLUTION_DIR/publish"

          declare -A projects=(
            [TaxSystem.Client]="$BUILD_CLIENT"
            [TaxSystem.CitizenService]="$BUILD_CITIZEN"
            [TaxSystem.CompanyService]="$BUILD_COMPANY"
            [TaxSystem.BankService]="$BUILD_BANK"
            [TaxSystem.StatementGeneratorService]="$BUILD_STATEMENTGENERATOR"
          )

          for project in "${!projects[@]}"; do
            if [[ "${projects[$project]}" != "true" ]]; then
              echo "Skipping $project (no changes detected)"
              continue
            fi

            dotnet publish "$TAXSYSTEM_SOLUTION_DIR/$project/$project.csproj" \
              --configuration Release --no-build \
              -o "$TAXSYSTEM_SOLUTION_DIR/publish/$project" /p:UseAppHost=false
          done

      - name: Build and push changed TaxSystem images
        shell: bash
        run: |
          set -euo pipefail

          # image name -> "Dockerfile path:manifest file:should build"
          declare -A images=(
            [taxsystem-client]="TaxSystem.Client/Dockerfile:client.yaml:$BUILD_CLIENT"
            [taxsystem-citizen-service]="TaxSystem.CitizenService/Dockerfile:citizen-service.yaml:$BUILD_CITIZEN"
            [taxsystem-company-service]="TaxSystem.CompanyService/Dockerfile:company-service.yaml:$BUILD_COMPANY"
            [taxsystem-bank-service]="TaxSystem.BankService/Dockerfile:bank-service.yaml:$BUILD_BANK"
            [taxsystem-statementgenerator-service]="TaxSystem.StatementGeneratorService/Dockerfile:statementgenerator-service.yaml:$BUILD_STATEMENTGENERATOR"
          )

          built_manifests=()

          for image in "${!images[@]}"; do
            IFS=':' read -r dockerfile manifest should_build <<< "${images[$image]}"

            if [[ "$should_build" != "true" ]]; then
              echo "Skipping $image (no changes detected)"
              continue
            fi

            docker build \
              -f "$TAXSYSTEM_SOLUTION_DIR/$dockerfile" \
              -t "$REGISTRY_PREFIX/$image:$SOURCE_SHA" \
              -t "$REGISTRY_PREFIX/$image:latest" \
              "$TAXSYSTEM_SOLUTION_DIR"

            docker push "$REGISTRY_PREFIX/$image:$SOURCE_SHA"
            docker push "$REGISTRY_PREFIX/$image:latest"

            built_manifests+=("applications/TaxSystem/$manifest")
          done

          printf '%s\n' "${built_manifests[@]}" > /tmp/built_manifests.txt

      - name: Update Flux manifest image tags
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -s /tmp/built_manifests.txt ]]; then
            echo "No images were built; nothing to update."
            exit 0
          fi

          while IFS= read -r file; do
            sed -i -E "s#image: ${REGISTRY_PREFIX}/([^:]+):[^[:space:]]+#image: ${REGISTRY_PREFIX}/\1:${SOURCE_SHA}#" "$file"
          done < /tmp/built_manifests.txt

          git diff -- $(cat /tmp/built_manifests.txt)

      - name: Commit deployment manifest updates
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -s /tmp/built_manifests.txt ]]; then
            exit 0
          fi

          if git diff --quiet -- $(cat /tmp/built_manifests.txt); then
            echo "Deployment manifests already point at this image."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add $(cat /tmp/built_manifests.txt)
          git commit -m "Deploy application images ${SOURCE_SHA}"
          git push origin HEAD:main
