name: Test TaxSystem RabbitMQ

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "applications/TaxSystem/TaxSystem/TaxSystem.Shared/Messaging/**"
      - "applications/TaxSystem/TaxSystem/TaxSystem.Tests/Messaging/**"
      - "applications/TaxSystem/TaxSystem/TaxSystem.Shared/TaxSystem.Shared.csproj"
      - "applications/TaxSystem/TaxSystem/TaxSystem.Tests/TaxSystem.Tests.csproj"
      - ".github/workflows/taxsystem-rabbitmq-integration.yml"

permissions:
  contents: read

concurrency:
  group: taxsystem-rabbitmq-integration
  cancel-in-progress: false

jobs:
  rabbitmq:
    name: Run RabbitMQ integration test
    runs-on:
      - self-hosted
      - linux
      - x64
      - ansible

    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Verify RabbitMQ is ready
        shell: bash
        run: |
          set -euo pipefail

          sudo -n kubectl \
            --kubeconfig=/etc/kubernetes/admin.conf \
            -n rabbitmq \
            wait pod/rabbitmq-0 \
            --for=condition=Ready \
            --timeout=120s

          sudo -n kubectl \
            --kubeconfig=/etc/kubernetes/admin.conf \
            -n rabbitmq \
            get pods,svc,helmrelease

      - name: Run RabbitMQ integration test
        shell: bash
        run: |
          set -euo pipefail

          sudo -n kubectl \
            --kubeconfig=/etc/kubernetes/admin.conf \
            -n rabbitmq \
            port-forward svc/rabbitmq 5672:5672 > /tmp/rabbitmq-port-forward.log 2>&1 &

          PORT_FORWARD_PID="$!"
          trap 'kill "$PORT_FORWARD_PID" 2>/dev/null || true' EXIT

          for attempt in {1..30}; do
            if timeout 1 bash -c '</dev/tcp/127.0.0.1/5672' 2>/dev/null; then
              break
            fi

            sleep 1
          done

          if ! timeout 1 bash -c '</dev/tcp/127.0.0.1/5672' 2>/dev/null; then
            cat /tmp/rabbitmq-port-forward.log
            exit 1
          fi

          export RABBITMQ_PASSWORD="$(sudo -n kubectl --kubeconfig=/etc/kubernetes/admin.conf -n rabbitmq get secret rabbitmq -o jsonpath='{.data.rabbitmq-password}' | base64 -d)"
          export RABBITMQ_USERNAME="taxsystem"
          export RABBITMQ_HOST="localhost"
          export RABBITMQ_PORT="5672"
          export RUN_RABBITMQ_TESTS="true"

          dotnet test \
            applications/TaxSystem/TaxSystem/TaxSystem.Tests/TaxSystem.Tests.csproj \
            --filter RabbitMqQueuePublishesEventToMatchingHandler
