name: Build Application Images

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Run Tests
    branches:
      - main
    types:
      - completed

permissions:
  contents: write
  packages: write

concurrency:
  group: application-images
  cancel-in-progress: false

jobs:
  build:
    name: Build and publish images
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    env:
      REGISTRY_PREFIX: ghcr.io/nicodm13/k8s-ansible-project
      TAXSYSTEM_SOLUTION_DIR: applications/TaxSystem/src
      SOURCE_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish TaxSystem projects
        shell: bash
        run: |
          set -euo pipefail

          dotnet build "$TAXSYSTEM_SOLUTION_DIR/TaxSystem.sln" --configuration Release
          rm -rf "$TAXSYSTEM_SOLUTION_DIR/publish"

          for project in \
            TaxSystem.Client \
            TaxSystem.CitizenService \
            TaxSystem.CompanyService \
            TaxSystem.BankService \
            TaxSystem.StatementGeneratorService; do
            dotnet publish "$TAXSYSTEM_SOLUTION_DIR/$project/$project.csproj" \
              --configuration Release --no-build \
              -o "$TAXSYSTEM_SOLUTION_DIR/publish/$project" /p:UseAppHost=false
          done

      - name: Build and push TaxSystem images
        shell: bash
        run: |
          set -euo pipefail

          declare -A images=(
            [taxsystem-client]=TaxSystem.Client/Dockerfile
            [taxsystem-citizen-service]=TaxSystem.CitizenService/Dockerfile
            [taxsystem-company-service]=TaxSystem.CompanyService/Dockerfile
            [taxsystem-bank-service]=TaxSystem.BankService/Dockerfile
            [taxsystem-statementgenerator-service]=TaxSystem.StatementGeneratorService/Dockerfile
          )

          for image in "${!images[@]}"; do
            docker build \
              -f "$TAXSYSTEM_SOLUTION_DIR/${images[$image]}" \
              -t "$REGISTRY_PREFIX/$image:$SOURCE_SHA" \
              -t "$REGISTRY_PREFIX/$image:latest" \
              "$TAXSYSTEM_SOLUTION_DIR"

            docker push "$REGISTRY_PREFIX/$image:$SOURCE_SHA"
            docker push "$REGISTRY_PREFIX/$image:latest"
          done

      - name: Update Flux manifest image tags
        shell: bash
        run: |
          set -euo pipefail

          for file in applications/TaxSystem/*.yaml; do
            sed -i -E "s#image: ${REGISTRY_PREFIX}/([^:]+):[^[:space:]]+#image: ${REGISTRY_PREFIX}/\1:${SOURCE_SHA}#" "$file"
          done

          git diff -- applications/TaxSystem/*.yaml

      - name: Commit deployment manifest updates
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- applications/TaxSystem/*.yaml; then
            echo "Deployment manifests already point at this image."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add applications/TaxSystem/*.yaml
          git commit -m "Deploy application images ${SOURCE_SHA}"
          git push origin HEAD:main
