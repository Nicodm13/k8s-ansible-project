name: Build Application Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "applications/main/app/**"
      - "applications/TaxSystem/TaxSystem/**"
      - ".github/workflows/main-application-image.yml"

permissions:
  contents: write
  packages: write

concurrency:
  group: application-images
  cancel-in-progress: false

jobs:
  build:
    name: Build and publish images
    runs-on: ubuntu-latest

    env:
      REGISTRY_PREFIX: ghcr.io/nicodm13/k8s-ansible-project
      MAIN_IMAGE_NAME: ghcr.io/nicodm13/k8s-ansible-project/main
      MAIN_DEPLOYMENT_FILE: applications/main/deployment.yaml
      TAXSYSTEM_SOLUTION_DIR: applications/TaxSystem/TaxSystem

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push main image
        uses: docker/build-push-action@v6
        with:
          context: applications/main/app
          push: true
          tags: |
            ${{ env.MAIN_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.MAIN_IMAGE_NAME }}:latest

      - name: Build and publish TaxSystem projects
        shell: bash
        run: |
          set -euo pipefail

          dotnet build "$TAXSYSTEM_SOLUTION_DIR/TaxSystem.sln" --configuration Release
          rm -rf "$TAXSYSTEM_SOLUTION_DIR/publish"

          for project in \
            TaxSystem.Client \
            TaxSystem.CitizenService \
            TaxSystem.CompanyService \
            TaxSystem.BankService \
            TaxSystem.StatementGeneratorService; do
            dotnet publish "$TAXSYSTEM_SOLUTION_DIR/$project/$project.csproj" \
              --configuration Release --no-build \
              -o "$TAXSYSTEM_SOLUTION_DIR/publish/$project" /p:UseAppHost=false
          done

      - name: Build and push TaxSystem images
        shell: bash
        run: |
          set -euo pipefail

          declare -A images=(
            [taxsystem-client]=TaxSystem.Client/Dockerfile
            [taxsystem-citizen-service]=TaxSystem.CitizenService/Dockerfile
            [taxsystem-company-service]=TaxSystem.CompanyService/Dockerfile
            [taxsystem-bank-service]=TaxSystem.BankService/Dockerfile
            [taxsystem-statementgenerator-service]=TaxSystem.StatementGeneratorService/Dockerfile
          )

          for image in "${!images[@]}"; do
            docker build \
              -f "$TAXSYSTEM_SOLUTION_DIR/${images[$image]}" \
              -t "$REGISTRY_PREFIX/$image:$GITHUB_SHA" \
              -t "$REGISTRY_PREFIX/$image:latest" \
              "$TAXSYSTEM_SOLUTION_DIR"

            docker push "$REGISTRY_PREFIX/$image:$GITHUB_SHA"
            docker push "$REGISTRY_PREFIX/$image:latest"
          done

      - name: Update Flux manifest image tags
        shell: bash
        run: |
          set -euo pipefail

          MAIN_IMAGE="${MAIN_IMAGE_NAME}:${GITHUB_SHA}"
          sed -i -E "s#image: ${MAIN_IMAGE_NAME}:[^[:space:]]+#image: ${MAIN_IMAGE}#" "$MAIN_DEPLOYMENT_FILE"

          for file in applications/TaxSystem/*.yaml; do
            sed -i -E "s#image: ${REGISTRY_PREFIX}/([^:]+):[^[:space:]]+#image: ${REGISTRY_PREFIX}/\1:${GITHUB_SHA}#" "$file"
          done

          git diff -- "$MAIN_DEPLOYMENT_FILE" applications/TaxSystem/*.yaml

      - name: Commit deployment manifest updates
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- "$MAIN_DEPLOYMENT_FILE" applications/TaxSystem/*.yaml; then
            echo "Deployment manifests already point at this image."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$MAIN_DEPLOYMENT_FILE" applications/TaxSystem/*.yaml
          git commit -m "Deploy application images ${GITHUB_SHA}"
          git push
