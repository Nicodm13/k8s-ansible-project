name: Deploy Kubernetes

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build Application Images
    branches:
      - main
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - "applications/*.yaml"
      - "applications/grafana/*.yaml"
      - "applications/TaxSystem/*.yaml"
      - "infrastructure/**"
      - "clusters/azure/flux/**"
      - ".github/workflows/deploy-kubernetes.yml"

permissions:
  contents: read

concurrency:
  group: deploy-kubernetes
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to cluster
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on:
      - self-hosted
      - Linux
      - X64

    env:
      KUBECONFIG: /etc/kubernetes/admin.conf

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Verify cluster access
        shell: bash
        run: |
          set -euo pipefail

          sudo -n kubectl --kubeconfig="$KUBECONFIG" version --client
          sudo -n kubectl --kubeconfig="$KUBECONFIG" get namespace flux-system
          sudo -n flux --kubeconfig="$KUBECONFIG" --version

      - name: Reconcile Flux
        shell: bash
        run: |
          set -euo pipefail

          sudo -n flux --kubeconfig="$KUBECONFIG" reconcile source git flux-system \
            --namespace flux-system

          sudo -n flux --kubeconfig="$KUBECONFIG" reconcile kustomization infrastructure \
            --namespace flux-system \
            --with-source

          sudo -n kubectl --kubeconfig="$KUBECONFIG" wait helmrelease/rabbitmq \
            --namespace taxsystem \
            --for=condition=Ready \
            --timeout=5m

          sudo -n kubectl --kubeconfig="$KUBECONFIG" get secret rabbitmq \
            --namespace taxsystem \
            --output name

          sudo -n flux --kubeconfig="$KUBECONFIG" reconcile kustomization applications \
            --namespace flux-system \
            --with-source

      - name: Show Flux status
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          sudo -n flux --kubeconfig="$KUBECONFIG" get kustomizations --namespace flux-system
