name: Run Tests (Legacy)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "applications/TaxSystem/**"
      - ".github/workflows/taxsystem-tests.yml"
  push:
    branches:
      - main
    paths:
      - "applications/TaxSystem/**"
      - ".github/workflows/taxsystem-tests.yml"

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: taxsystem
          RABBITMQ_DEFAULT_PASS: taxsystem-password
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run tests
        shell: bash
        env:
          RABBITMQ_PASSWORD: taxsystem-password
          RABBITMQ_USERNAME: taxsystem
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: "5672"
          RUN_RABBITMQ_TESTS: "true"
        run: |
          set -euo pipefail

          dotnet test \
            applications/TaxSystem/TaxSystem/TaxSystem.Tests/TaxSystem.Tests.csproj
