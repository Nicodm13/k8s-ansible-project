name: Test TaxSystem

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "applications/TaxSystem/**"
      - ".github/workflows/taxsystem-tests.yml"
  push:
    branches:
      - main
    paths:
      - "applications/TaxSystem/**"
      - ".github/workflows/taxsystem-tests.yml"

permissions:
  contents: read

jobs:
  test:
    name: Run TaxSystem tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail

          dotnet test \
            applications/TaxSystem/TaxSystem/TaxSystem.Tests/TaxSystem.Tests.csproj
