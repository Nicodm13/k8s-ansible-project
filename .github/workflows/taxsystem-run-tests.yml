name: Run Tests

on:
  workflow_dispatch:
  pull_request:
      
permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Set up Minikube
        uses: medyagh/setup-minikube@latest
        with:
          minikube-version: latest
          driver: docker

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run TaxSystem tests
        shell: bash
        run: |
          set -euo pipefail
          chmod +x applications/TaxSystem/src/run-tests.sh
          applications/TaxSystem/src/run-tests.sh
