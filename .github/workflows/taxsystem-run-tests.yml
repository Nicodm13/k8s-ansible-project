name: Run Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "applications/TaxSystem/**"
      - ".github/workflows/taxsystem-run-tests.yml"
  push:
    paths:
      - "applications/TaxSystem/**"
      - ".github/workflows/taxsystem-run-tests.yml"

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Set up Minikube
        uses: medyagh/setup-minikube@latest
        with:
          minikube-version: latest
          driver: docker

      - name: Run TaxSystem tests
        shell: bash
        run: |
          set -euo pipefail
          chmod +x applications/TaxSystem/TaxSystem/run-tests.sh
          applications/TaxSystem/TaxSystem/run-tests.sh
