---
- name: Install iptables package
  ansible.builtin.apt:
    name: iptables
    state: present
    update_cache: true

- name: Ensure iptables rules directory exists
  ansible.builtin.file:
    path: "{{ ingress_forwarding_rules_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    sysctl_set: true
    reload: true

- name: Install ingress forwarding rules
  ansible.builtin.template:
    src: ingress-forwarding.rules.v4.j2
    dest: "{{ ingress_forwarding_rules_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload ingress forwarding

- name: Install ingress forwarding systemd service
  ansible.builtin.template:
    src: ingress-forwarding.service.j2
    dest: "/etc/systemd/system/{{ ingress_forwarding_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Reload ingress forwarding

- name: Enable and start ingress forwarding service
  ansible.builtin.systemd:
    name: "{{ ingress_forwarding_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
