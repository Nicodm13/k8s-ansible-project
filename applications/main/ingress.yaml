apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main
  namespace: main
spec:
  ingressClassName: traefik
  rules:
    - host: mydomain.dk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: main
                port:
                  name: http
