# CloudNativePG Operator Installation
#
# The operator must be installed BEFORE applying postgres-cluster.yaml.
#
# For CI / manual install:
#   kubectl apply --server-side -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.25/releases/cnpg-1.25.1.yaml
#
# For production (Flux GitOps), add a HelmRelease in your infrastructure repo:
#   chart: cloudnative-pg from https://cloudnative-pg.github.io/charts
#   namespace: cnpg-system
#
# Memory footprint: ~50MB for the operator controller pod.
#
# Verify installation:
#   kubectl get deployment -n cnpg-system cnpg-controller-manager
---
apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
  labels:
    app.kubernetes.io/name: cloudnative-pg
