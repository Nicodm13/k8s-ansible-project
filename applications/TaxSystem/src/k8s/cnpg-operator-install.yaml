# CloudNativePG Operator Installation
#
# This file fetches and installs the CloudNativePG operator from the official release.
# Apply this BEFORE any Cluster resources:
#
#   kubectl apply --server-side -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.25/releases/cnpg-1.25.1.yaml
#
# Or apply this file which re-exports the same manifest:
#   kubectl apply --server-side -f k8s/cnpg-operator-install.yaml
#
# The operator installs into the cnpg-system namespace and manages Cluster CRDs cluster-wide.
# Memory footprint: ~50MB for the operator controller pod.
#
# Verify installation:
#   kubectl get deployment -n cnpg-system cnpg-controller-manager
#
# Note: This file is intentionally a pointer/instructions file.
# The actual operator manifest is large (~5000 lines) and should be fetched from upstream.
# In CI, use the kubectl apply command above as a pre-deployment step.
---
apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
  labels:
    app.kubernetes.io/name: cloudnative-pg

