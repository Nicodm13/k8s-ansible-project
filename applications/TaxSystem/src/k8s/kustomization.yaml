apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Operator installation (HelmRelease - installs CRDs)
  - cnpg-operator-install.yaml
  # Credentials (needed before cluster and services)
  - postgres-credentials.yaml
  - rabbitmq-credentials.yaml
  # PostgreSQL cluster (depends on operator CRDs being available)
  - postgres-cluster.yaml
  # Application services
  - rabbitmq.yaml
  - client.yaml
  - citizen-service.yaml
  - company-service.yaml
  - bank-service.yaml
  - statementgenerator-service.yaml

