apiVersion: v1
kind: Secret
metadata:
  name: taxsystem-db-app-credentials
  namespace: tax-system
type: kubernetes.io/basic-auth
stringData:
  username: "taxsystem"
  password: "taxsystem-dev"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: tax-system
type: Opaque
stringData:
  # Write connections → taxsystem-db-rw (always primary)
  CITIZEN_DB_CONNECTION_WRITE: "Host=taxsystem-db-rw;Port=5432;Database=citizen_db;Username=taxsystem;Password=taxsystem-dev"
  COMPANY_DB_CONNECTION_WRITE: "Host=taxsystem-db-rw;Port=5432;Database=company_db;Username=taxsystem;Password=taxsystem-dev"
  BANK_DB_CONNECTION_WRITE: "Host=taxsystem-db-rw;Port=5432;Database=bank_db;Username=taxsystem;Password=taxsystem-dev"
  STATEMENT_DB_CONNECTION_WRITE: "Host=taxsystem-db-rw;Port=5432;Database=statement_db;Username=taxsystem;Password=taxsystem-dev"
  # Read connections → taxsystem-db-ro (load-balanced across replicas)
  CITIZEN_DB_CONNECTION_READ: "Host=taxsystem-db-ro;Port=5432;Database=citizen_db;Username=taxsystem;Password=taxsystem-dev"
  COMPANY_DB_CONNECTION_READ: "Host=taxsystem-db-ro;Port=5432;Database=company_db;Username=taxsystem;Password=taxsystem-dev"
  BANK_DB_CONNECTION_READ: "Host=taxsystem-db-ro;Port=5432;Database=bank_db;Username=taxsystem;Password=taxsystem-dev"
  STATEMENT_DB_CONNECTION_READ: "Host=taxsystem-db-ro;Port=5432;Database=statement_db;Username=taxsystem;Password=taxsystem-dev"


