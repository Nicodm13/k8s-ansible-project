name: TaxSystem Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'applications/TaxSystem/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'applications/TaxSystem/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_DIR: applications/TaxSystem/src

jobs:
  service-tests:
    name: Service-Level Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        working-directory: ${{ env.SOLUTION_DIR }}
        run: dotnet restore TaxSystem.Tests/TaxSystem.Tests.csproj

      - name: Build
        working-directory: ${{ env.SOLUTION_DIR }}
        run: dotnet build TaxSystem.Tests/TaxSystem.Tests.csproj --no-restore

      - name: Run service-level tests
        working-directory: ${{ env.SOLUTION_DIR }}
        run: dotnet test TaxSystem.Tests/TaxSystem.Tests.csproj --no-build --logger "trx;LogFileName=service-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-test-results
          path: ${{ env.SOLUTION_DIR }}/**/TestResults/*.trx

  e2e-tests:
    name: E2E Tests (Minikube)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Start Minikube
        uses: medyagh/setup-minikube@latest
        with:
          minikube-version: 'latest'
          driver: docker

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run E2E test runner
        working-directory: ${{ env.SOLUTION_DIR }}
        run: |
          chmod +x ./run-tests.sh
          ./run-tests.sh --skip-unit

      - name: Dump pod logs on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods
          echo "=== Client Logs ==="
          kubectl logs -l app=client --tail=50 || true
          echo "=== RabbitMQ Logs ==="
          kubectl logs -l app=rabbitmq --tail=50 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: ${{ env.SOLUTION_DIR }}/**/TestResults/*.trx
