# CloudNativePG Cluster for TaxSystem
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: taxsystem-db
  namespace: taxsystem
spec:
  instances: 2

  imageName: ghcr.io/cloudnative-pg/postgresql:16.4

  postgresql:
    synchronous:
      method: any
      number: 1
    parameters:
      shared_buffers: "64MB"
      work_mem: "4MB"
      max_connections: "50"
      effective_cache_size: "128MB"
      synchronous_commit: "on"

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  storage:
    size: 2Gi

  bootstrap:
    initdb:
      database: taxsystem
      owner: taxsystem
      secret:
        name: taxsystem-db-app-credentials
      postInitSQL:
        - CREATE DATABASE citizen_db OWNER taxsystem;
        - CREATE DATABASE company_db OWNER taxsystem;
        - CREATE DATABASE bank_db OWNER taxsystem;
        - CREATE DATABASE statement_db OWNER taxsystem;

  monitoring:
    enablePodMonitor: false
