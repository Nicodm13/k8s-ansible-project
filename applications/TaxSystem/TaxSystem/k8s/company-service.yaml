apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-service
  namespace: tax-system
  labels:
    app: company-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: company-service
  template:
    metadata:
      labels:
        app: company-service
    spec:
      containers:
        - name: company-service
          image: taxsystem-company-service:latest
          imagePullPolicy: Never
          env:
            - name: TAXSYSTEM_DATA_PATH
              value: "/var/lib/taxsystem"
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              value: "guest"
            - name: RABBITMQ_PASSWORD
              value: "guest"
          volumeMounts:
            - name: taxsystem-data
              mountPath: /var/lib/taxsystem
      volumes:
        - name: taxsystem-data
          persistentVolumeClaim:
            claimName: taxsystem-data
---
apiVersion: v1
kind: Service
metadata:
  name: company-service
  namespace: tax-system
spec:
  selector:
    app: company-service
  ports:
    - port: 80
      targetPort: 8080

