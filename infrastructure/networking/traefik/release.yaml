apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik

spec:
  interval: 30m

  chart:
    spec:
      chart: traefik
      version: "41.0.2"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 6h

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:

    deployment:
      replicas: 1

    hostNetwork: false

    service:
      enabled: true
      spec:
        type: NodePort
        externalTrafficPolicy: Cluster

    ingressClass:
      enabled: true
      isDefaultClass: true

    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: true

    ports:
      web:
        expose:
          default: true
        exposedPort: 80
        nodePort: 30080
        protocol: TCP

      websecure:
        expose:
          default: true
        exposedPort: 443
        nodePort: 30443
        protocol: TCP

    # logs:
    #   general:
    #     level: INFO
