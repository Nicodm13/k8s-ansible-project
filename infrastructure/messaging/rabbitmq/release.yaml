apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rabbitmq
  namespace: rabbitmq

spec:
  interval: 30m

  chart:
    spec:
      chart: rabbitmq
      version: 16.0.14
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 6h

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    auth:
      username: taxsystem

    service:
      type: ClusterIP

    persistence:
      enabled: true
      storageClass: local-path
      size: 1Gi

    resourcesPreset: small
