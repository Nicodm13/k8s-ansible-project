# CloudNativePG Operator - Flux HelmRepository
#
# This repository is consumed by infrastructure/database/cloudnative-pg/release.yaml.
# Flux applies this as part of the infrastructure kustomization before applications.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cnpg
  namespace: flux-system
spec:
  interval: 24h
  url: https://cloudnative-pg.github.io/charts
